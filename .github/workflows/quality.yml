name: Quality Gates
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov radon vulture pyyaml
          npm install -g jscpd

      - name: Enforce requirement coverage markers
        run: python scripts/req_coverage.py --strict --prefix REQ

      - name: Enforce test coverage threshold
        run: |
          COVERAGE=$(grep '^coverage_threshold:' scripture.yaml | sed 's/^coverage_threshold: *//; s/ *#.*//')
          if [ -z "$COVERAGE" ]; then
            echo "::error::Missing coverage_threshold in scripture.yaml"
            exit 1
          fi
          if ! find tests -type f -name 'test_*.py' | grep -q .; then
            echo "::error::No tests found under tests/"
            exit 1
          fi
          pytest -q --tb=short --cov=. --cov-fail-under="$COVERAGE"

      - name: Enforce complexity, dead code, and duplication on changed Python files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED_PY=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\\.py$' || true)
          if [ -z "$CHANGED_PY" ]; then
            echo "No Python files changed; static quality gates skipped"
            exit 0
          fi

          echo "$CHANGED_PY" > /tmp/changed_py_all.txt
          while IFS= read -r f; do
            if [ -f "$f" ]; then
              echo "$f"
            fi
          done < /tmp/changed_py_all.txt > /tmp/changed_py_existing.txt

          if [ ! -s /tmp/changed_py_existing.txt ]; then
            echo "No existing changed Python files to scan"
            exit 0
          fi

          RADON_OUT=$(xargs radon cc --min D --show-complexity --no-assert < /tmp/changed_py_existing.txt | grep -E '^\s+[A-Z]\s' || true)
          if [ -n "$RADON_OUT" ]; then
            echo "$RADON_OUT"
            echo "::error::Functions with complexity >= 21 (grade D) detected"
            exit 1
          fi

          xargs vulture --min-confidence 80 < /tmp/changed_py_existing.txt

          TARGETS=$(tr '\n' ' ' < /tmp/changed_py_existing.txt)
          jscpd $TARGETS --min-lines 10 --min-tokens 80 --threshold 5 --format python --reporters console
